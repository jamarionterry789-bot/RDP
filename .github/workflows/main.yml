name: windows-rdp-gui

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:

    - name: Show Current User
      run: |
        whoami

    - name: Set Admin Password
      run: |
        net user runneradmin P@ssw0rd123

    - name: Enable RDP
      run: |
        reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f
        netsh advfirewall firewall set rule group="remote desktop" new enable=Yes

    - name: Download Tailscale
      shell: powershell
      run: |
        Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -OutFile tailscale.exe

    - name: Install Tailscale
      shell: powershell
      run: |
        Start-Process .\tailscale.exe /S -Wait

    - name: Connect Tailscale
      shell: powershell
      run: |
        $authkey = "${{ secrets.TS_AUTHKEY }}"
        if ([string]::IsNullOrEmpty($authkey)) {
          Write-Host "TS_AUTHKEY belum di-set!"
          exit 1
        }

        & "C:\Program Files\Tailscale\tailscale.exe" up `
        --authkey=$authkey `
        --hostname=github-rdp `
        --accept-routes `
        --reset

    - name: Fix Desktop Environment
      shell: powershell
      run: |
        Write-Host "Memperbaiki GUI Windows..."

        # restart explorer
        taskkill /f /im explorer.exe
        Start-Sleep -Seconds 2
        Start-Process explorer.exe

        # enable interactive desktop
        reg add "HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" /v EnableLUA /t REG_DWORD /d 0 /f

        # start shell
        Start-Process "C:\Windows\explorer.exe"

    - name: Show Tailscale IP
      shell: powershell
      run: |
        Write-Host "===== TAILSCALE IP ====="
        & "C:\Program Files\Tailscale\tailscale.exe" ip
        Write-Host "========================"

    - name: Keep Runner Alive
      shell: powershell
      run: |
        Write-Host "Windows RDP siap digunakan."
        while ($true) {
          Start-Sleep -Seconds 300
          Write-Host "Runner aktif $(Get-Date)"
        }
