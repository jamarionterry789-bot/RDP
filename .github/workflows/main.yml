name: windows-rdp-strong

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:

    - name: Show User
      run: whoami

    - name: Set Admin Password
      run: net user runneradmin P@ssw0rd123

    - name: Enable RDP
      run: |
        reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f
        netsh advfirewall firewall set rule group="remote desktop" new enable=Yes

    - name: Download Tailscale
      shell: powershell
      run: |
        Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -OutFile tailscale.exe

    - name: Install Tailscale
      shell: powershell
      run: |
        Start-Process .\tailscale.exe /S -Wait

    - name: Connect Tailscale
      shell: powershell
      run: |
        $authkey="${{ secrets.TS_AUTHKEY }}"
        if([string]::IsNullOrEmpty($authkey)){ exit 1 }

        & "C:\Program Files\Tailscale\tailscale.exe" up `
          --authkey=$authkey `
          --hostname=github-rdp `
          --accept-routes `
          --reset

    - name: Fix Windows GUI
      shell: powershell
      run: |
        Write-Host "Memperbaiki environment desktop..."

        taskkill /f /im explorer.exe
        Start-Sleep -Seconds 2
        Start-Process explorer.exe

        # refresh desktop shell
        Start-Process "C:\Windows\explorer.exe"

        # disable lock screen
        reg add "HKLM\SOFTWARE\Policies\Microsoft\Windows\Personalization" /v NoLockScreen /t REG_DWORD /d 1 /f

    - name: Show Tailscale IP
      shell: powershell
      run: |
        Write-Host "========== TAILSCALE IP =========="
        & "C:\Program Files\Tailscale\tailscale.exe" ip
        Write-Host "=================================="

    - name: Monitor Connection
      shell: powershell
      run: |
        Write-Host "Runner aktif. Anda bisa login via RDP."
        while ($true) {
          $status = & "C:\Program Files\Tailscale\tailscale.exe" status
          Write-Host "Status:"
          Write-Host $status
          Start-Sleep -Seconds 300
        }
