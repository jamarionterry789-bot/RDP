name: windows-rdp-tailscale

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:

    - name: Show current user
      run: |
        whoami

    - name: Download Tailscale
      shell: powershell
      run: |
        Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -OutFile tailscale.exe

    - name: Install Tailscale
      shell: powershell
      run: |
        Start-Process .\tailscale.exe /S -Wait

    - name: Connect Tailscale
      shell: powershell
      run: |
        & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TS_AUTHKEY }} --hostname github-runner --accept-routes

    - name: Set Admin Password
      shell: powershell
      run: |
        net user runneradmin P@ssw0rd123

    - name: Enable Remote Desktop
      shell: powershell
      run: |
        reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f
        netsh advfirewall firewall set rule group="remote desktop" new enable=Yes

    - name: Show Tailscale IP
      shell: powershell
      run: |
        Write-Host "Tailscale IP:"
        & "C:\Program Files\Tailscale\tailscale.exe" ip

    - name: Show System Info
      shell: powershell
      run: |
        hostname
        ipconfig
        net localgroup administrators

    - name: Keep Runner Alive
      shell: powershell
      run: |
        Write-Host "Runner aktif. Silakan login via RDP."
        while ($true) {
          Start-Sleep -Seconds 300
          Write-Host "Runner masih aktif $(Get-Date)"
        }
