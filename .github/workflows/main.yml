name: Windows RDP VPS Mode

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:

    - name: Setup Administrator
      run: |
        net user administrator /active:yes
        net user administrator Admin@123
        net localgroup administrators administrator /add

    - name: Create VPS User
      run: |
        net user vpsadmin StrongPass123 /add
        net localgroup administrators vpsadmin /add
        net user vpsadmin /active:yes

    - name: Enable Remote Desktop
      run: |
        reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

    - name: Install Tailscale
      run: |
        choco install tailscale -y

    - name: Connect Tailscale
      env:
        TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
      run: |
        tailscale up --authkey $env:TS_AUTHKEY --hostname github-rdp --accept-routes

    - name: Show Tailscale IP
      run: |
        Write-Host "RDP IP:"
        tailscale ip -4

    - name: Keep Runner Alive
      run: |
        Write-Host "RDP is running..."
        Start-Sleep -Seconds 21600
